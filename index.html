<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mandala Visualizer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
  }
  canvas { display: block; touch-action: none; }
  #ui {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
  }
  .btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    padding: 10px 22px;
    border-radius: 999px;
    font-size: 13px;
    letter-spacing: 0.1em;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: background 0.2s, border-color 0.2s;
  }
  .btn:active { background: rgba(255,255,255,0.18); }
  .btn.active { border-color: #f0a; background: rgba(255,0,170,0.18); }
  #status {
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    letter-spacing: 0.15em;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="status">TAP START TO BEGIN</div>
<div id="ui">
  <button class="btn" id="btnStart">▶ START MIC</button>
  <button class="btn" id="btnColor">PALETTE</button>
  <button class="btn" id="btnLayers">LAYERS</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

let W, H, cx, cy, minDim;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
  minDim = Math.min(W, H);
}
resize();
window.addEventListener('resize', resize);

let audioCtx, analyser, dataArray, bufferLength;
let isRunning = false;
let micStream = null;

async function startMic() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    micStream = stream;
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = 0.8;
    bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);
    source.connect(analyser);
    isRunning = true;
    status.textContent = '● LISTENING';
    document.getElementById('btnStart').textContent = '■ STOP';
    document.getElementById('btnStart').classList.add('active');
  } catch(e) {
    status.textContent = 'MIC ERROR: ' + e.message;
  }
}

function stopMic() {
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  isRunning = false;
  analyser = null;
  status.textContent = 'STOPPED';
  document.getElementById('btnStart').textContent = '▶ START MIC';
  document.getElementById('btnStart').classList.remove('active');
}

document.getElementById('btnStart').addEventListener('click', () => {
  if (isRunning) stopMic(); else startMic();
});

const palettes = [
  ['#ff00aa','#aa00ff','#00ffcc','#ff6600'],
  ['#00ffff','#0077ff','#7700ff','#ffffff'],
  ['#ffdd00','#ff4400','#ff0077','#ffaa00'],
  ['#00ff88','#00ccff','#88ff00','#ffffff'],
  ['#ff88cc','#cc44ff','#44ccff','#ffcc44'],
];
let palIdx = 0;
document.getElementById('btnColor').addEventListener('click', () => {
  palIdx = (palIdx + 1) % palettes.length;
});

const layerModes = ['mandala','star','web','all'];
let layerIdx = 3;
document.getElementById('btnLayers').addEventListener('click', () => {
  layerIdx = (layerIdx + 1) % layerModes.length;
  status.textContent = layerModes[layerIdx].toUpperCase();
  setTimeout(() => { if (isRunning) status.textContent = '● LISTENING'; }, 1000);
});

let t = 0;
let smoothVol = 0, smoothBass = 0, smoothMid = 0, smoothHigh = 0;

function getFreqBand(start, end) {
  if (!analyser) return 0;
  let sum = 0;
  for (let i = start; i < end; i++) sum += dataArray[i];
  return sum / ((end - start) * 255);
}

function getVolume() {
  if (!analyser) return 0;
  analyser.getByteFrequencyData(dataArray);
  let sum = 0;
  for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
  return sum / (bufferLength * 255);
}

function drawMandala(radius, segments, vol, bass, mid, high, pal, alpha, rotOffset) {
  const step = (Math.PI * 2) / segments;
  const innerR = radius * (0.3 + bass * 0.3);
  const outerR = radius * (0.7 + vol * 0.5);
  const petalAmp = radius * 0.18 * (1 + mid * 1.5);
  const twist = t * 0.4 + rotOffset;
  for (let s = 0; s < segments; s++) {
    const angle = step * s + twist;
    const nextAngle = step * (s + 1) + twist;
    const midAngle = (angle + nextAngle) / 2;
    ctx.save();
    ctx.globalAlpha = alpha * (0.5 + vol * 0.5);
    ctx.beginPath();
    const x1 = cx + Math.cos(angle) * innerR;
    const y1 = cy + Math.sin(angle) * innerR;
    const x2 = cx + Math.cos(angle) * outerR;
    const y2 = cy + Math.sin(angle) * outerR;
    const cpx = cx + Math.cos(midAngle) * (outerR + petalAmp);
    const cpy = cy + Math.sin(midAngle) * (outerR + petalAmp);
    const cp2x = cx + Math.cos(nextAngle) * innerR;
    const cp2y = cy + Math.sin(nextAngle) * innerR;
    ctx.moveTo(x1, y1);
    ctx.quadraticCurveTo(cpx, cpy, x2, y2);
    ctx.lineTo(cx + Math.cos(nextAngle) * outerR, cy + Math.sin(nextAngle) * outerR);
    ctx.quadraticCurveTo(cpx, cpy, cp2x, cp2y);
    ctx.closePath();
    const grad = ctx.createRadialGradient(cx, cy, innerR, cx, cy, outerR + petalAmp);
    grad.addColorStop(0, pal[s % pal.length] + '88');
    grad.addColorStop(1, pal[(s + 1) % pal.length] + '22');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = pal[s % pal.length] + 'aa';
    ctx.lineWidth = 0.5 + high * 1.5;
    ctx.stroke();
    ctx.restore();
  }
}

function drawStarBurst(radius, points, vol, bass, high, pal, alpha, rotOffset) {
  const step = (Math.PI * 2) / points;
  const twist = t * 0.6 + rotOffset;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  for (let i = 0; i <= points * 2; i++) {
    const angle = (step / 2) * i + twist;
    const r = (i % 2 === 0) ? radius * (0.7 + vol * 0.6) : radius * (0.25 + bass * 0.25);
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
  grad.addColorStop(0, pal[0] + '55');
  grad.addColorStop(0.6, pal[1] + '33');
  grad.addColorStop(1, pal[2] + '00');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = pal[3 % pal.length] + 'cc';
  ctx.lineWidth = 0.8 + high * 2;
  ctx.stroke();
  ctx.restore();
}

function drawWeb(radius, rings, spokes, vol, bass, mid, pal, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha * 0.7;
  const twist = t * 0.2;
  for (let r = 1; r <= rings; r++) {
    const rr = (radius / rings) * r * (0.8 + vol * 0.3);
    ctx.beginPath();
    for (let s = 0; s <= spokes; s++) {
      const angle = (Math.PI * 2 / spokes) * s + twist * (r % 2 === 0 ? 1 : -1);
      const wobble = rr * 0.06 * Math.sin(t * 2 + s + r);
      const x = cx + Math.cos(angle) * (rr + wobble * bass);
      const y = cy + Math.sin(angle) * (rr + wobble * bass);
      s === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = pal[r % pal.length] + Math.floor(80 + mid * 120).toString(16).padStart(2,'0');
    ctx.lineWidth = 0.5 + mid;
    ctx.stroke();
  }
  for (let s = 0; s < spokes; s++) {
    const angle = (Math.PI * 2 / spokes) * s + twist;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(angle) * radius * (1 + vol * 0.3), cy + Math.sin(angle) * radius * (1 + vol * 0.3));
    ctx.strokeStyle = pal[s % pal.length] + '44';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  ctx.restore();
}

function drawPulseCircles(radius, vol, bass, pal, alpha) {
  ctx.save();
  for (let i = 3; i >= 1; i--) {
    const r = radius * (0.15 * i) * (1 + bass * 0.8);
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = pal[i % pal.length] + Math.floor(40 + vol * 180).toString(16).padStart(2,'0');
    ctx.lineWidth = 1 + vol * 3;
    ctx.globalAlpha = alpha * (0.3 + vol * 0.5);
    ctx.stroke();
  }
  ctx.restore();
}

function drawBloom(vol, bass, pal) {
  const r = minDim * 0.35 * (0.5 + bass * 1.2);
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  grad.addColorStop(0, pal[0] + Math.floor(vol * 60).toString(16).padStart(2,'0'));
  grad.addColorStop(1, '#00000000');
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function render() {
  requestAnimationFrame(render);
  t += 0.012;
  const pal = palettes[palIdx];
  const mode = layerModes[layerIdx];
  const rawVol = getVolume();
  smoothVol += (rawVol - smoothVol) * 0.15;
  if (analyser) {
    smoothBass += (getFreqBand(0, 8) - smoothBass) * 0.15;
    smoothMid  += (getFreqBand(8, 64) - smoothMid) * 0.12;
    smoothHigh += (getFreqBand(64, 128) - smoothHigh) * 0.1;
  } else {
    smoothVol  = 0.08 + Math.sin(t * 1.1) * 0.06;
    smoothBass = 0.12 + Math.sin(t * 0.7) * 0.08;
    smoothMid  = 0.08 + Math.sin(t * 1.5) * 0.05;
    smoothHigh = 0.05 + Math.sin(t * 2.3) * 0.04;
  }
  const vol = smoothVol, bass = smoothBass, mid = smoothMid, high = smoothHigh;
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = `rgba(0,0,0,${0.18 + vol * 0.1})`;
  ctx.fillRect(0, 0, W, H);
  ctx.globalCompositeOperation = 'screen';
  if (mode === 'mandala' || mode === 'all') {
    drawMandala(R * 0.95, 12, vol, bass, mid, high, pal, 0.9, 0);
    drawMandala(R * 0.55, 8,  vol, bass, mid, high, pal, 0.6, Math.PI / 8);
    drawMandala(R * 0.28, 6,  vol, bass, mid, high, pal, 0.5, Math.PI / 6);
  }
  if (mode === 'star' || mode === 'all') {
    drawStarBurst(R * 0.85, 7, vol, bass, high, pal, 0.5, 0);
    drawStarBurst(R * 0.5,  5, vol, bass, high, pal, 0.4, Math.PI / 5);
  }
  if (mode === 'web' || mode === 'all') {
    drawWeb(R, 6, 16, vol, bass, mid, pal, 0.6);
  }
  drawPulseCircles(R, vol, bass, pal, 0.8);
  drawBloom(vol, bass, pal);
}

const R = minDim * 0.42;
render();
</script>
</body>
</html>
